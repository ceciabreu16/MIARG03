<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Formulario de DNI</title>
    <link rel="stylesheet" href="https://use.typekit.net/hdq5bvf.css">    
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <style>
@font-face {
  font-family: 'NombreDeTuFuente'; 
  src: url('NimbusSanL-Reg.otf') format('opentype');
}

        body {
            font-family: "NombreDeTuFuente", sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: normal;
            height: 100vh;
        }

        #dni-container {
            position: relative;
            width: 400px;
            max-width: 100%;
            height: auto;
            margin: 0 auto;
        }

        #dni-image {
            width: 100%;
            display: block;
        }

        #datos-overlay {
            position: absolute;
            top: 0;
            left: 0;
        }

        .load {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100px;
            height: 100px;
        }
        .load hr {
            border: 0; margin: 0; width: 40%; height: 40%;
            position: absolute; border-radius: 50%;
            animation: spin 2s ease infinite;
        }
        .load :first-child  { background: #6dcfbd; animation-delay: -1.5s; }
        .load :nth-child(2) { background: #3af6e6; animation-delay: -1s; }
        .load :nth-child(3) { background: rgb(67,225,253); animation-delay: -0.5s; }
        .load :last-child   { background: #49a5c9; }

        @keyframes spin {
            0%,100% { transform: translate(0); }
            25%     { transform: translate(160%); }
            50%     { transform: translate(160%, 160%); }
            75%     { transform: translate(0, 160%); }
        }

        .btn { border: none; color: white; padding: 14px 28px; cursor: pointer; border-radius: 5px; }
        .primary { background-color: #007bff; }
    </style>
</head>
<body>
<br>
<div id="load" class="load" style="display:none;">
    <hr/><hr/><hr/><hr/>
</div>
<div id="todo">
    <div id="dni-container">
        <img id="dni-image" src="dni.jpg" alt="DNI">
        <canvas id="datos-overlay"></canvas>
    </div>

    <!-- Botón para ir al reverso (se muestra al final) -->
    <center>
        <form id="dni-form4" style="display:none; margin-top:10px;">
            <button class="btn primary">
                <a style="text-decoration:none; color:white;" href="indexAtras.html">EDITAR PARTE DE ATRAS</a>
            </button>
        </form>
    </center>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.3.2/html2canvas.min.js"></script>
<script>

// ── DATOS HARDCODEADOS ──────────────────────────────────────────────
var DATOS = {
    apellido:     "WOLMAN",
    nombre:       "CLARA F",
    sexo:         "F",
    nacionalidad: "ARGENTINA",
    ejemplar:     "A",
    nacimiento:   "13 MAY/MAY 2006",
    emision:      "29 JUL/JUL 2023",
    vencimiento:  "29 JUL/JUL 2038",
    tramite:      "007084555487603",
    dni:          "46.359.853",
    fotoSrc:      "foto_clarilla.jpg",
    firmaSrc:     "firma_clara_wolman.png"
};
// ────────────────────────────────────────────────────────────────────

// Guardar en localStorage para indexAtras.html
localStorage.setItem('apellido',     DATOS.apellido);
localStorage.setItem('nombre',       DATOS.nombre);
localStorage.setItem('sexo',         DATOS.sexo);
localStorage.setItem('ejemplar',     DATOS.ejemplar);
localStorage.setItem('nacionalidad', DATOS.nacionalidad);
localStorage.setItem('nacimiento',   DATOS.nacimiento);
localStorage.setItem('emision',      DATOS.emision);
localStorage.setItem('vencimiento',  DATOS.vencimiento);
localStorage.setItem('tramite',      DATOS.tramite);
localStorage.setItem('dni',          DATOS.dni);

window.onload = function() {
    var dniContainer = document.getElementById('dni-container');
    var rect = dniContainer.getBoundingClientRect();
    if (!(rect.top >= 0 && rect.bottom <= window.innerHeight)) {
        var nuevaPosicion = rect.top + (window.innerHeight - rect.height) / 2;
        dniContainer.style.marginTop = Math.max(-20, nuevaPosicion) + 'px';
    } else {
        dniContainer.style.marginTop = '0px';
    }

    // Esperar a que la imagen base del DNI cargue antes de dibujar
    var dniImg = document.getElementById('dni-image');
    if (dniImg.complete) {
        dibujarTodo();
    } else {
        dniImg.onload = dibujarTodo;
    }
};

function dibujarTodo() {
    dibujarDatos(function() {
        dibujarFoto(function() {
            dibujarFirma(function() {
                // Todo listo: capturar y guardar en localStorage, luego ir al reverso
                capturarYAvanzar();
            });
        });
    });
}

// ── 1. Dibuja los datos de texto sobre el canvas ──────────────────
function dibujarDatos(callback) {
    var canvas  = document.getElementById('datos-overlay');
    var imagen  = document.getElementById('dni-image');
    // En mobile la imagen puede reportar width=0 si aún no pintó; usar naturalWidth como fallback
    var imgW = imagen.width  || imagen.naturalWidth  || 400;
    var imgH = imagen.height || imagen.naturalHeight || 250;
    canvas.width  = imgW;
    canvas.height = imgH;
    var ctx = canvas.getContext('2d');
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    var fontSize = 12;
    ctx.fillStyle = 'black';
    ctx.font = fontSize + 'px NombreDeTuFuente, Arial';

    ctx.fillText(DATOS.nombre,       imgW * 0.31,  imgH * 0.265);
    ctx.fillText(DATOS.apellido,     imgW * 0.31,  imgH * 0.365);
    ctx.fillText(DATOS.sexo,         imgW * 0.31,  imgH * 0.47);
    ctx.fillText(DATOS.nacionalidad, imgW * 0.448, imgH * 0.47);
    ctx.fillText(DATOS.ejemplar,     imgW * 0.765, imgH * 0.47);
    ctx.fillText(DATOS.nacimiento,   imgW * 0.31,  imgH * 0.568);
    ctx.fillText(DATOS.emision,      imgW * 0.31,  imgH * 0.67);
    ctx.fillText(DATOS.vencimiento,  imgW * 0.31,  imgH * 0.777);

    var xtramite = imgW * 0.31;
    var ytramite = imgH * 0.9;
    var tramite  = DATOS.tramite;
    if (tramite.length > 11) {
        ctx.fillText(tramite.substring(0, 11), xtramite, ytramite);
        ctx.fillText(tramite.substring(11),    xtramite, ytramite + fontSize);
    } else {
        ctx.fillText(tramite, xtramite, ytramite);
    }

    ctx.font = 'bold 16px ROBOO, Arial';
    ctx.fillText(DATOS.dni, imgW * 0.04, imgH * 0.92);

    if (callback) callback();
}

// ── 2. Dibuja la foto de la persona ──────────────────────────────
function dibujarFoto(callback) {
    var canvas  = document.getElementById('datos-overlay');
    var imagen  = document.getElementById('dni-image');
    var imgW = imagen.width  || imagen.naturalWidth  || 400;
    var imgH = imagen.height || imagen.naturalHeight || 250;
    var ctx = canvas.getContext('2d');

    var foto = new Image();
    foto.onload = function() {
        var x = 20;
        var y = imgH * 0.27;
        var w = imgW * 0.25;
        var h = imgH * 0.535;
        ctx.drawImage(foto, x, y, w, h);
        if (callback) callback();
    };
    foto.onerror = function() { if (callback) callback(); };
    foto.src = DATOS.fotoSrc;
}

// ── 3. Dibuja la firma ───────────────────────────────────────────
function dibujarFirma(callback) {
    var canvas  = document.getElementById('datos-overlay');
    var ctx = canvas.getContext('2d');

    var firma = new Image();
    firma.onload = function() {
        var escala = canvas.width / 400;
        ctx.drawImage(firma, 285 * escala, 110 * escala, 90 * escala, 82 * escala);
        if (callback) callback();
    };
    firma.onerror = function() { if (callback) callback(); };
    firma.src = DATOS.firmaSrc;
}

// ── 4. Captura el DNI completo y guarda en localStorage ──────────
function capturarYAvanzar() {
    document.getElementById('load').style.display = 'block';
    document.getElementById('todo').style.opacity = '0.5';

    html2canvas(document.getElementById('dni-container')).then(function(canvas) {
        var img = canvas.toDataURL('image/png');
        localStorage.setItem('dniFrente', img);

        document.getElementById('load').style.display = 'none';
        document.getElementById('todo').style.opacity = '1';

        // Mostrar botón para ir al reverso
        document.getElementById('dni-form4').style.display = 'block';
    });
}

</script>
</body>
</html>

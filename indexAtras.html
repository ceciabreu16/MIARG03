<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Formulario de DNI</title>
    <link rel="stylesheet" href="https://use.typekit.net/hdq5bvf.css">    
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.3.2/html2canvas.min.js"></script>

    <style>
@font-face {
  font-family: 'NombreDeTuFuente'; 
  src: url('NimbusSanL-Reg.otf') format('opentype');
}
@font-face {
  font-family: 'NombreDeTuFuente2'; 
  src: url('NimbusSanL-Reg.woff') format('opentype');
}

        body {
            font-family: "NombreDeTuFuente", "NombreDeTuFuente2";
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: normal;
            height: 100vh;
        }

        #dni-container {
    position: relative;
    width: 400px;
    height: auto;
    margin: 0 auto;
}

        #dni-image {
            width: 100%;
            display: block;
        }

        #datos-overlay {
            position: absolute;
            top: 0;
            left: 0;
        }

        #dni-form {
            width: 100%;
            box-sizing: border-box;
            background-color: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            position: relative;
            z-index: 1;
        }

        #dni-form label, #dni-form input, #dni-form button {
            width: 100%;
            box-sizing: border-box;
            margin-bottom: 10px;
        }

.load{position:absolute;top:50%;left:50%;transform:translate(-50%, -50%);
  width:100px;
  height:100px;
}
.load hr{border:0;margin:0;width:40%;height:40%;position:absolute;border-radius:50%;animation:spin 2s ease infinite}

.load :first-child{background:#6dcfbd;animation-delay:-1.5s}
.load :nth-child(2){background:#3af6e6;animation-delay:-1s}
.load :nth-child(3){background:rgb(67, 225, 253);animation-delay:-0.5s}
.load :last-child{background:#49a5c9}

@keyframes spin{
  0%,100%{transform:translate(0)}
  25%{transform:translate(160%)}
  50%{transform:translate(160%, 160%)}
  75%{transform:translate(0, 160%)}
}
    </style>
</head>
<body>
    <div id="load" class="load" style="display: none;">
        <hr/><hr/><hr/><hr/>
      </div>
      <div id="todo">
    <div id="dni-container">
        <img id="dni-image" src="dniAtras.jpg" alt="DNI">
        <canvas id="datos-overlay"></canvas>
    </div>
    <form id="dni-form">
        <label for="domicilio">Domicilio: </label>
        <input value="Primera Junta 370, Haedo, Morón" type="text" id="domicilio" name="domicilio" oninput="actualizarDatos()">
        <button type="button" onclick="avanzar()">AVANZAR</button>
    </form>
</div>
    <script>

// ── DATOS HARDCODEADOS ──────────────────────────────────────────────
var DOMICILIO_DEFAULT = "Primera Junta 370, Haedo, Morón";
// ────────────────────────────────────────────────────────────────────

var renglon1;
var renglon2;
var renglon3;

window.onload = function() {
    let dniContainer = document.getElementById('dni-container');
    let rect = dniContainer.getBoundingClientRect();
    let isVisible = (rect.top >= 0) && (rect.bottom <= window.innerHeight);
    if (!isVisible) {
        let nuevaPosicion = rect.top + (window.innerHeight - rect.height) / 2;
        nuevaPosicion = Math.max(-20, nuevaPosicion);
        dniContainer.style.marginTop = nuevaPosicion + 'px';
    } else {
        dniContainer.style.marginTop = '0px';
    }

    var dniSinEspaciosYPuntos      = (localStorage.getItem('dni') || '46359853').replace(/[\s.]+/g, '');
    var apellidoSinEspaciosYPuntos = (localStorage.getItem('nombre') || 'CLARAF').replace(/[\s.]+/g, '');
    var nacimientoRaw              = localStorage.getItem('nacimiento') || '13 MAY/MAY 2006';
    // Tomar los últimos 2 dígitos del año
    var nacimientoAño = nacimientoRaw.slice(-2);

    renglon1 = "IDARG" + dniSinEspaciosYPuntos + "<1<<<<<<<<<<<<<<<";
    renglon2 = nacimientoAño + Math.floor(10000 + Math.random() * 90000) + (localStorage.getItem("sexo") || "F") + Math.floor(1000000 + Math.random() * 9000000) + "ARG<<<<<<<<<<<" + Math.floor(Math.random() * 10);
    renglon3 = apellidoSinEspaciosYPuntos + "<<" + (localStorage.getItem("apellido") || "WOLMAN");

    actualizarDatos();
};

function avanzar() {
    html2canvas(document.getElementById('dni-container')).then(function(canvas) {
        var img = canvas.toDataURL('image/png');
        document.getElementById("dni-image").src = img;
        // Guardar imagen reverso en localStorage
        localStorage.setItem('dniAtras', img);
        window.location.href = "vistaPreviaDni.html";
    });
}

function actualizarDatos() {
    var canvas   = document.getElementById('datos-overlay');
    var imagen   = document.getElementById('dni-image');
    canvas.width  = imagen.width;
    canvas.height = imagen.height;
    var contexto = canvas.getContext('2d');
    var domicilio = document.getElementById("domicilio").value.toUpperCase();
    const maxWidth = 362;

    contexto.clearRect(0, 0, canvas.width, canvas.height);

    contexto.fillStyle = 'black';
    contexto.font = 15 + 'px NombreDeTuFuente';
    contexto.letterSpacing = '2px'; 

    var xApellido = imagen.width * 0.09;
    var yApellido = imagen.height * 0.733;
    var xNombre   = imagen.width * 0.09;
    var yNombre   = imagen.height * 0.815;
    var xsexo     = imagen.width * 0.09;
    var ysexo     = imagen.height * 0.897;
    var xdomicilio= imagen.width * 0.04;
    var ydomicilio= imagen.height * 0.13;
    var xLugarN   = imagen.width * 0.04;
    var yLugarN   = imagen.height * 0.19;

    var espaciadoEntreLetras = 2;

    function truncateAndFill(text, maxW) {
        let width = contexto.measureText(text).width;
        while (width + 80 > maxW) {
            text = text.slice(0, -1);
            width = contexto.measureText(text).width;
        }
        const additionalChars = "<";
        while (width + 80 + contexto.measureText(additionalChars).width <= maxW) {
            text += additionalChars;
            width = contexto.measureText(text).width;
        }
        return text;
    }

    var text2 = truncateAndFill(renglon1, maxWidth);
    var text3 = truncateAndFill(renglon2, maxWidth);
    var text4 = truncateAndFill(renglon3, maxWidth);

    for (var i = 0; i < text2.length; i++) {
        contexto.fillText(text2[i], xApellido, yApellido);
        xApellido += contexto.measureText(text2[i]).width + espaciadoEntreLetras;
    }
    for (var i = 0; i < text3.length; i++) {
        contexto.fillText(text3[i], xNombre, yNombre);
        xNombre += contexto.measureText(text3[i]).width + espaciadoEntreLetras;
    }
    for (var i = 0; i < text4.length; i++) {
        contexto.fillText(text4[i], xsexo, ysexo);
        xsexo += contexto.measureText(text4[i]).width + espaciadoEntreLetras;
    }

    contexto.font = 11 + 'px NombreDeTuFuente';

    const text = "DOMICILIO: " + domicilio;
    function truncateTextToFit(t, maxW) {
        let width = contexto.measureText(t).width;
        while (width > maxW) {
            t = t.slice(0, -1);
            width = contexto.measureText(t).width;
        }
        return t;
    }
    contexto.fillText(truncateTextToFit(text, maxWidth), xdomicilio, ydomicilio);

    contexto.font = 9 + 'px NombreDeTuFuente';
    contexto.fillText("LUGAR DE NACIMIENTO:", xLugarN, yLugarN);
}

    </script>
</body>
</html>
